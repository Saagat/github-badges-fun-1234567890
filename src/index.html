<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Dev Suite | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <header>
            <div class="logo">✨</div>
            <h1>Stellar Dev Suite</h1>
            <p>Advanced Achievement Dashboard</p>
        </header>
        
        <main class="stats-grid">
            <div class="card glass">
                <div class="badge-image"><img src="../assets/badges/pull-shark-gold.png" alt="Pull Shark"></div>
                <h3>Pull Shark</h3>
                <p>Tier 3 - Gold Achieved</p>
                <div class="progress-bar"><div class="fill" style="width: 100%;"></div></div>
            </div>
            <div class="card glass">
                <div class="badge-image"><img src="../assets/badges/pair-extraordinaire-gold.png" alt="Pair Extraordinaire"></div>
                <h3>Pair Extraordinaire</h3>
                <p>Tier 4 - Co-authoring Master</p>
                <div class="progress-bar"><div class="fill" style="width: 100%;"></div></div>
            </div>
            <div class="card glass">
                <div class="badge-image"><img src="../assets/badges/quickdraw-default.png" alt="Quickdraw"></div>
                <h3>Quickdraw</h3>
                <p>Swift Action Unlocked</p>
                <div class="progress-bar"><div class="fill" style="width: 100%;"></div></div>
            </div>
            <div class="card glass">
                <div class="badge-image"><img src="../assets/badges/heart-on-your-sleeve-default.png" alt="Heart on Sleeve"></div>
                <h3>Heart on Sleeve</h3>
                <p>Community Engagement</p>
                <div class="progress-bar"><div class="fill" style="width: 100%;"></div></div>
            </div>
        </main>

        <footer class="glass">
            <p>&copy; 2026 Nathan | <a href="https://github.com/nathandev-7/github-badges-fun-1234567890" target="_blank" style="color: #00d2ff; text-decoration: none; font-weight: 600;">View on GitHub</a></p>
        </footer>
    </div>
</body>
</html>
